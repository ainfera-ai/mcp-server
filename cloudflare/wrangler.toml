name = "ainfera-mcp-proxy"
main = "worker.js"
compatibility_date = "2026-05-19"
workers_dev = false

# Route mcp.ainfera.ai/* → the Modal MCP server.
#
# Prerequisite: a DNS-only AAAA/CNAME record for `mcp` on the ainfera.ai
# zone, so Cloudflare proxies traffic through the Workers fleet.
# (Already in place — `dig mcp.ainfera.ai` returns CF anycast IPs.)
[[routes]]
pattern = "mcp.ainfera.ai/*"
zone_name = "ainfera.ai"

# No secrets are needed: the worker reverse-proxies whatever the client
# sent. The Modal origin URL is hardcoded in worker.js.

# Observability defaults — keep logs cheap.
[observability]
enabled = true
head_sampling_rate = 0.05
